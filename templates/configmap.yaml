apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-exporter-script
  namespace: {{ .Release.Namespace }}
  labels:
    app: version-exporter
    galleon: {{ .Values.galleonName }}
data:
  exporter.py: |
{{`
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json, ssl, os, threading, time

    GALLEON_NAME = os.environ.get("GALLEON_NAME", "unknown")

    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    API = "https://kubernetes.default.svc"

    cached_metrics = ""
    lock = threading.Lock()

    def kube_get(path):
        import urllib.request
        token = open(TOKEN_PATH).read()
        ctx = ssl.create_default_context(cafile=CA_PATH)
        req = urllib.request.Request(
            API + path,
            headers={"Authorization": "Bearer " + token}
        )
        try:
            resp = urllib.request.urlopen(req, context=ctx, timeout=15)
            return json.loads(resp.read())
        except Exception as e:
            print("Error fetching " + path + ": " + str(e), flush=True)
            return None

    def get_deployment_version(namespace, deployment):
        data = kube_get("/apis/apps/v1/namespaces/" + namespace + "/deployments/" + deployment)
        if not data:
            return None, -1
        try:
            image = data["spec"]["template"]["spec"]["containers"][0]["image"]
            version = image.split(":")[-1] if ":" in image else "unknown"
        except:
            version = "unknown"
        ready = data.get("status", {}).get("readyReplicas", 0) or 0
        return version, 1 if ready > 0 else 0

    def check_namespace_running(namespace):
        for kind in ["deployments", "statefulsets", "daemonsets"]:
            data = kube_get("/apis/apps/v1/namespaces/" + namespace + "/" + kind)
            if data:
                for item in data.get("items", []):
                    ready = item.get("status", {}).get("readyReplicas", 0) or 0
                    if ready > 0:
                        return 1
        return 0

    def get_all_versions():
        results = {
            "kubernetes":   {"version": "N/A", "status": -1},
            "eksa":         {"version": "N/A", "status": -1},
            "kubevirt":     {"version": "N/A", "status": -1},
            "rook_ceph":    {"version": "N/A", "status": -1},
            "gpu_operator": {"version": "N/A", "status": -1},
            "cdi":          {"version": "N/A", "status": -1},
            "argocd":       {"version": "N/A", "status": -1},
            "velero":       {"version": "N/A", "status": -1},
        }

        data = kube_get("/version")
        if data:
            results["kubernetes"] = {"version": data.get("gitVersion", "unknown"), "status": 1}

        ver, status = get_deployment_version("eksa-system", "eksa-controller-manager")
        if ver:
            results["eksa"] = {"version": ver, "status": status}

        data = kube_get("/apis/kubevirt.io/v1/kubevirts")
        if data and data.get("items"):
            ver = data["items"][0].get("status", {}).get("observedKubeVirtVersion", "")
            if ver:
                results["kubevirt"] = {"version": ver, "status": check_namespace_running("kubevirt")}

        ver, status = get_deployment_version("rook-ceph", "rook-ceph-operator")
        if ver:
            results["rook_ceph"] = {"version": ver, "status": status}

        ver, status = get_deployment_version("gpu-operator", "gpu-operator")
        if ver:
            results["gpu_operator"] = {"version": ver, "status": status}

        data = kube_get("/apis/cdi.kubevirt.io/v1beta1/cdis")
        if data and data.get("items"):
            ver = data["items"][0].get("status", {}).get("observedVersion", "")
            if ver:
                results["cdi"] = {"version": ver, "status": check_namespace_running("cdi")}

        ver, status = get_deployment_version("argocd", "argocd-server")
        if ver:
            results["argocd"] = {"version": ver, "status": status}

        ver, status = get_deployment_version("velero", "velero")
        if ver:
            results["velero"] = {"version": ver, "status": status}

        return results

    def collect_metrics():
        global cached_metrics
        while True:
            results = get_all_versions()
            lines = [
                "# HELP cluster_addon_info Add-on version info",
                "# TYPE cluster_addon_info gauge",
                "# HELP cluster_addon_status Add-on status 1=running 0=not_running -1=not_installed",
                "# TYPE cluster_addon_status gauge",
            ]
            for comp, info in sorted(results.items()):
                ver = info["version"]
                status = info["status"]
                lines.append('cluster_addon_info{cluster="' + GALLEON_NAME + '",component="' + comp + '",version="' + ver + '"} 1')
                lines.append('cluster_addon_status{cluster="' + GALLEON_NAME + '",component="' + comp + '",version="' + ver + '"} ' + str(status))
            with lock:
                cached_metrics = "\n".join(lines) + "\n"
            print("[" + GALLEON_NAME + "] Metrics updated at " + time.strftime("%H:%M:%S"), flush=True)
            time.sleep(300)

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/metrics":
                with lock:
                    body = cached_metrics
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(body.encode())
            else:
                self.send_response(404)
                self.end_headers()
        def log_message(self, *a): pass

    t = threading.Thread(target=collect_metrics, daemon=True)
    t.start()
    time.sleep(2)
    print("Version exporter for " + GALLEON_NAME + " running on :9100", flush=True)
    HTTPServer(("0.0.0.0", 9100), Handler).serve_forever()
`}}
